<html>

<body>
    <table class="table table-striped table-bordered">
        <thead class="bg-primary bg-opacity-50">
            <tr>
                <th>Name</th>
                <th>Register Number</th>
                <th>Age</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let stu of student">
                <td>{{stu.name|uppercase}}</td>
                <td>{{stu.registerNumber|lowercase}}</td>
                <td>{{stu.age}}</td>
            </tr>
        </tbody>
    </table>
</body>
