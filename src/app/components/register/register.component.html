<div class="register-container">
  <h2>Customer Registration</h2>
  <p class="register-subtitle">Join as a customer to browse and purchase amazing deals</p>
  
  <form (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" [(ngModel)]="registerData.fullName" name="fullName" required>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="registerData.email" name="email" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="registerData.password" name="password" required minlength="6">
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" required minlength="6">
    </div>
    <button type="submit" class="register-btn">Register as Customer</button>
    <p *ngIf="errorMessage" class="error">{{ errorMessage }}</p>
    <p *ngIf="successMessage" class="success">{{ successMessage }}</p>
  </form>
  
  <div class="auth-options">
    <p>Want to sell products? <a routerLink="/register-merchant" class="merchant-link">Register as Merchant</a></p>
    <p>Already have an account? <a routerLink="/login">Login</a></p>
  </div>
</div>
