<div class="register-container">
  <h2>Merchant Registration</h2>
  <p class="register-subtitle">Join as a merchant to sell your products and grow your business</p>
  
  <form (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Business Name</label>
      <input type="text" [(ngModel)]="registerData.fullName" name="fullName" required>
    </div>
    <div class="form-group">
      <label>Business Email</label>
      <input type="email" [(ngModel)]="registerData.email" name="email" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="registerData.password" name="password" required minlength="6">
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" required minlength="6">
    </div>
    <button type="submit" class="register-btn merchant-btn" [disabled]="loading">
      {{ loading ? 'Creating Account...' : 'Become a Merchant' }}
    </button>
    <p *ngIf="errorMessage" class="error">{{ errorMessage }}</p>
    <p *ngIf="successMessage" class="success">{{ successMessage }}</p>
  </form>
  
  <div class="auth-options">
    <p>Want to shop instead? <a routerLink="/register" class="customer-link">Register as Customer</a></p>
    <p>Already have an account? <a routerLink="/login">Login</a></p>
  </div>
</div>
