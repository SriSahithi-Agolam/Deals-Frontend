<div class="login-container">
  <h2>Login</h2>
  <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="loginData.email" name="email" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="loginData.password" name="password" required>
    </div>
    <button type="submit" [disabled]="!loginForm.valid">Login</button>
    <p *ngIf="errorMessage" class="error">{{ errorMessage }}</p>
  </form>
  
  <div class="auth-options">
    <p>Don't have an account?</p>
    <div class="register-buttons">
      <a routerLink="/register" class="register-btn customer-btn">Sign up as Customer</a>
      <a routerLink="/register-merchant" class="register-btn merchant-btn">Become a Merchant</a>
    </div>
  </div>
</div>
