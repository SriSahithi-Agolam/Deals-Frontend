<body>
  <!--Fill code for heading-->
  <h1>{{title}}</h1>
  <table>
    <tr>
      <!--Fill code for name-->
      <td><label for="name">Name</label></td>
      <td><input type="text" id="name" name="name" [(ngModel)]="name"></td>
    </tr>
    <tr>
      <!--Fill code for Number of Tickets-->
      <td><label for="tickets">Number of Tickets</label></td>
      <td><input type="number" id="tickets" name="tickets" [(ngModel)]="tickets"></td>
    </tr>
    <tr>
      <!--Fill code for Departure City-->
      <td><label for="departureCity">Departure City</label></td>
      <td><input type="text" id="departureCity" name="departureCity" [(ngModel)]="departureCity"></td>
    </tr>
    <tr>
      <!--Fill code for Destination City-->
      <td><label for="destinationCity">Destination City</label></td>
      <td><input type="text" id="destinationCity" name="destinationCity" [(ngModel)]="departureCity"></td>
    </tr>
    <tr>
      <!--Fill code for Flight Class Type-->
      <!--Fill code for dynamic dropdown-->
      <td><label for="flightClass">Flight Class Type</label></td>
      <select name="flightClass" id="flightClass" [(ngModel)]="selectedClass">
        <option value="">Select Flight Class Type</option>
        <option *ngFor="let flightClass of flightClassList" [value]="flightClass.name">{{flightClass.name}}</option>
      </select>
    </tr>
  </table>
  <!--Fill you code here for button and display status-->
  <button type="submit"(click)="showStatus()">Book Ticket</button>
  <p *ngIf="status">{{status}}</p>
</body>
